name: Build

on:
  push:
  pull_request:

jobs:
  check-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate JIRA key in PR title
        run: |
          title="${{ github.event.pull_request.title }}"
          if [[ ! "$title" =~ ^\[[A-Z]+-[0-9]+\] ]]; then
            echo "PR title must start with a JIRA key, e.g. [J-422] your title here"
            exit 1
          fi

  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Hello
        run: echo "CI/CD is working!"
