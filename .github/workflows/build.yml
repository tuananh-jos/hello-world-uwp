name: Build

on:
  push:
  pull_request:

jobs:
  check-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Validate JIRA key in PR title
        id: validate
        run: |
          title="${{ github.event.pull_request.title }}"
          if [[ ! "$title" =~ ^\[[A-Z]+-[0-9]+\] ]]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "valid=true" >> $GITHUB_OUTPUT

      - name: Comment on PR if title is invalid
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '**PR title validation failed.**\n\nTitle must start with a JIRA key.\n\nExample: `[J-422] add github actions build workflow`'
            })

  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Hello
        run: echo "CI/CD is working!"
